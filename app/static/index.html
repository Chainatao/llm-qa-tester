<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM QA Tester</title>
  <style>
    :root {
      --bg: #f8f7f3;
      --surface: #ffffff;
      --ink: #1c2428;
      --ink-soft: #42535b;
      --accent: #b33a3a;
      --border: #d9d5cb;
    }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: radial-gradient(circle at 10% 10%, #fff6e8 0%, var(--bg) 40%, #eef4f7 100%);
      color: var(--ink);
    }
    .wrap {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 16px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
    }
    h1 {
      margin-top: 0;
      font-size: 28px;
    }
    p {
      color: var(--ink-soft);
    }
    label {
      display: block;
      margin-top: 14px;
      font-weight: 600;
    }
    textarea {
      width: 100%;
      min-height: 140px;
      margin-top: 8px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      font-size: 14px;
      box-sizing: border-box;
    }
    button {
      margin-top: 16px;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 10px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    pre {
      margin-top: 20px;
      background: #0f1720;
      color: #d8e7f5;
      padding: 14px;
      border-radius: 10px;
      overflow: auto;
      max-height: 420px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>LLM QA Tester</h1>
      <p>Paste a question and test your llm-qa service via this proxy.</p>

      <label for="question">Question</label>
      <textarea id="question" placeholder="Write your question..."></textarea>

      <label for="options">Options (optional)</label>
      <textarea id="options" placeholder="A. ...&#10;B. ...&#10;C. ...&#10;D. ..."></textarea>

      <button id="sendBtn">Ask</button>
      <pre id="output">Result will appear here.</pre>
    </div>
  </div>

  <script>
    const sendBtn = document.getElementById("sendBtn");
    const question = document.getElementById("question");
    const options = document.getElementById("options");
    const output = document.getElementById("output");

    async function ask() {
      const q = question.value.trim();
      if (!q) {
        output.textContent = "Question is required.";
        return;
      }

      sendBtn.disabled = true;
      output.textContent = "Loading...";

      try {
        const res = await fetch("/api/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            question: q,
            options: options.value.trim() || null,
          }),
        });

        const data = await res.json();
        output.textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        output.textContent = "Request failed: " + err;
      } finally {
        sendBtn.disabled = false;
      }
    }

    sendBtn.addEventListener("click", ask);
  </script>
</body>
</html>
